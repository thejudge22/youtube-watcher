services:
  app:
    build: .
    #image: ghcr.io/thejudge22/youtube-watcher:latest
    # Or use specific version: ghcr.io/thejudge22/youtube-watcher:v2026-04-20
    ports:
      - "38000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    user: "1000:1000"
    restart: unless-stopped
